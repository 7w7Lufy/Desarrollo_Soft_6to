<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca FrontEnd</title>
    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            max-width: 900px; 
            margin: auto; 
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .seccion {
            border: 2px solid #e0e0e0;
            padding: 15px;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .seccion h3 {
            margin-top: 0;
            color: #333;
        }
        input, select, button { 
            display: block; 
            width: 100%; 
            margin-bottom: 10px; 
            padding: 8px; 
            box-sizing: border-box;
        }
        select {
            cursor: pointer;
        }
        .btn-prestar { background-color: #3498db; color: white; border: none; cursor: pointer; }
        .btn-devolver { background-color: #e67e22; color: white; border: none; cursor: pointer; }
        .btn-agregar { background-color: #27ae60; color: white; border: none; cursor: pointer; }
        button:hover { opacity: 0.9; }
        #resultado { 
            margin-top: 15px; 
            font-weight: bold; 
            text-align: center; 
            padding: 10px;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th {
            background-color: #3498db;
            color: white;
            padding: 10px;
            text-align: left;
        }
        td {
            padding: 8px;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .tabla-prestamos {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <h2 style="text-align: center;">📚 Sistema de Gestión de Biblioteca</h2>
    
    <div class="container">

        <div class="seccion">
            <h3>➕ Agregar Nuevo Libro</h3>
            <input type="text" id="titulo_nuevo" placeholder="Título del Libro">
            <button class="btn-agregar" onclick="agregarLibro()">Agregar Libro</button>
        </div>


        <div class="seccion">
            <h3>📖 Préstamos y Devoluciones</h3>
            <input type="text" id="usuario" placeholder="Nombre del Usuario (Ej. Ana o Juan)">
            <select id="libro_select">
                <option value="">Seleccione un libro...</option>
            </select>
            
            <button class="btn-prestar" onclick="gestionarLibro('prestar')">Solicitar Préstamo</button>
            <button class="btn-devolver" onclick="gestionarLibro('devolver')">Devolver Libro</button>
        </div>
    </div>

    <div id="resultado"></div>


    <div class="seccion tabla-prestamos">
        <h3>📋 Préstamos Actuales</h3>
        <table id="tablaPrestamos">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Libro</th>
                    <th>ID</th>
                </tr>
            </thead>
            <tbody id="bodyPrestamos">
                <tr>
                    <td colspan="3" style="text-align: center;">Cargando...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5000';


        async function cargarLibros() {
            try {
                const response = await fetch(`${API_URL}/libros`);
                const libros = await response.json();
                
                const select = document.getElementById('libro_select');
                select.innerHTML = '<option value="">Seleccione un libro...</option>';
                
                libros.forEach(libro => {
                    const option = document.createElement('option');
                    option.value = libro.id;
                    option.textContent = `${libro.titulo} ${libro.disponible ? '✓' : '✗ (Prestado)'}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error al cargar libros:', error);
            }
        }


        async function cargarPrestamos() {
            try {
                const response = await fetch(`${API_URL}/prestamos`);
                const prestamos = await response.json();
                
                const tbody = document.getElementById('bodyPrestamos');
                
                if (prestamos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">No hay préstamos activos</td></tr>';
                } else {
                    tbody.innerHTML = prestamos.map(p => `
                        <tr>
                            <td>${p.usuario}</td>
                            <td>${p.titulo}</td>
                            <td>${p.id_libro}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error al cargar préstamos:', error);
                document.getElementById('bodyPrestamos').innerHTML = 
                    '<tr><td colspan="3" style="text-align: center; color: red;">Error al cargar préstamos</td></tr>';
            }
        }


        async function agregarLibro() {
            const titulo = document.getElementById('titulo_nuevo').value.trim();
            
            if (!titulo) {
                mostrarResultado("Por favor, ingresa el título del libro.", "red");
                return;
            }

            try {
                const response = await fetch(`${API_URL}/libros`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo })
                });
                
                const data = await response.json();
                mostrarResultado(data.mensaje || data.error, response.ok ? 'green' : 'red');
                
                if (response.ok) {
                    document.getElementById('titulo_nuevo').value = '';
                    await cargarLibros();
                }
            } catch (error) {
                mostrarResultado("Error conectando al servidor. ¿Está encendido el app.py?", "red");
            }
        }


        async function gestionarLibro(accion) {
            const usuario = document.getElementById('usuario').value.trim();
            const id_libro = parseInt(document.getElementById('libro_select').value);
            
            if (!usuario || isNaN(id_libro)) {
                mostrarResultado("Por favor, llena ambos campos correctamente.", "red");
                return;
            }
            
            const url = `${API_URL}/${accion}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, id_libro })
                });
                
                const data = await response.json();
                mostrarResultado(data.mensaje || data.error, response.ok ? 'green' : 'red');
                
                if (response.ok) {
                    await cargarLibros();
                    await cargarPrestamos();
                    document.getElementById('libro_select').value = '';
                }
            } catch (error) {
                mostrarResultado("Error conectando al servidor. ¿Está encendido el app.py?", "red");
            }
        }


        function mostrarResultado(mensaje, color) {
            const resultado = document.getElementById('resultado');
            resultado.innerText = mensaje;
            resultado.style.color = color;
            resultado.style.backgroundColor = color === 'green' ? '#d4edda' : '#f8d7da';
        }


        window.onload = function() {
            cargarLibros();
            cargarPrestamos();
        };
    </script>
</body>
</html>
